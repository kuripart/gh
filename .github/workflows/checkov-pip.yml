name: Reusable Checkov Scan (pip)

on:
  workflow_dispatch:
    inputs:
      directory:
        description: "Directory to scan"
        required: false
        type: string
        default: "."
    
      framework:
        description: "IaC framework"
        required: false
        type: string
        default: "terraform"
    
      checks:
        description: "Checkov checks to run"
        required: false
        type: string
        default: ""
    
      soft_fail:
        description: "Do not fail workflow on findings"
        required: false
        type: boolean
        default: false


jobs:
  checkov:
    name: Checkov IaC Scan (pip)
    runs-on: ubuntu-latest


    permissions:
      contents: read
      security-events: write
    
    env:
      CHECKOV_SKIP_UPDATE: "true"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
    
      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov
    
      - name: Run Checkov
        shell: bash
        run: |
          CMD="checkov \
            -d '${{ inputs.directory }}' \
            --framework '${{ inputs.framework }}' \
            --compact \
            --skip-download"
    
          if [[ -n "${{ inputs.checks }}" ]]; then
            CMD="$CMD --check '${{ inputs.checks }}'"
          fi
    
          if [[ "${{ inputs.soft_fail }}" == "true" ]]; then
            CMD="$CMD --soft-fail"
          fi
    
          echo "Executing: $CMD"
          eval $CMD
    
      - name: Generate SARIF report
        if: always()
        shell: bash
        run: |
          EXTRA_ARGS=""
    
          if [[ -n "${{ inputs.checks }}" ]]; then
            EXTRA_ARGS="--check '${{ inputs.checks }}'"
          fi
    
          eval "checkov \
            -d '${{ inputs.directory }}' \
            --framework '${{ inputs.framework }}' \
            --skip-download \
            -o sarif \
            --output-file-path results.sarif \
            $EXTRA_ARGS"
    
      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
